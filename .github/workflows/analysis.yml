name: Run analysis and tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'notebook.ipynb'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest src/test_analysis.py -v

      - name: Generate charts
        run: python src/generate_charts.py

      - name: Execute notebook
        run: |
          python -m ipykernel install --user --name python3
          jupyter nbconvert --to notebook --execute notebook.ipynb --output notebook_check.ipynb
          rm -f notebook_check.ipynb
          echo "Notebook executed successfully"
