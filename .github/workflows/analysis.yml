name: Run analysis and tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'notebook.ipynb'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate charts (required before tests)
        run: |
          cd src && python -c "
          import sys; sys.path.insert(0, '.')
          import pandas as pd
          from charts import generate_all
          from pathlib import Path
          df = pd.read_csv('../dataset.csv')
          if df.columns[0] == '' or df.columns[0].startswith('Unnamed'):
              df = df.drop(columns=[df.columns[0]])
          df['amount_gbp'] = pd.to_numeric(df['amount_gbp'], errors='coerce') * 1000
          generate_all(df, Path('../output/charts_final'))
          "

      - name: Run tests
        run: python -m pytest src/test_analysis.py -v

      - name: Execute notebook
        run: |
          python -m ipykernel install --user --name python3
          jupyter nbconvert --to notebook --execute notebook.ipynb --output notebook_check.ipynb
          rm -f notebook_check.ipynb
          echo "Notebook executed successfully"
